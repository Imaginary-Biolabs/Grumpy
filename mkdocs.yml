site_name: Grumpy
site_description: High-performance numerical computing on ragged and nested data
site_url: https://imaginary-biolabs.github.io/Grumpy/
repo_url: https://github.com/Imaginary-Biolabs/Grumpy
repo_name: Imaginary-Biolabs/Grumpy
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/grumpy_icon.svg
  favicon: assets/grumpy_favicon.svg
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: imaginary
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: imaginary-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Arrays: arrays.md
  - Dataframes: dataframes.md
  - Saving and loading: saving-loading.md
  - Compilation: compilation.md
  - GPU Acceleration: gpu-acceleration.md
  - License FAQ: license-faq.md
  - API Reference: api.md

extra_css:
  - stylesheets/imaginary.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Imaginary-Biolabs/Grumpy
    - icon: fontawesome/solid/globe
      link: https://www.imaginary.bio

copyright: Copyright &copy; 2026 Imaginary Biolabs GmbH

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.snippets:
      check_paths: true
      base_path: ["."]
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: numpy
            show_source: false
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            show_if_no_docstring: true
            show_root_toc_entry: false
            allow_inspection: true
            preload_modules:
              - grumpy

validation:
  links:
    not_found: ignore
    unrecognized_links: ignore

strict: true

hooks:
  - docs/hooks.py

watch:
  - docs/generated
