# Build platform wheels and publish to PyPI on version tags.
#
# Trigger a release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Manual build (artifacts only, no PyPI upload):
#   GitHub → Actions → Release → Run workflow
#
# PyPI setup (one-time):
#   1. Create the grumpy project on pypi.org
#   2. Add a Trusted Publisher (OIDC) for this repo + workflow release.yml + environment pypi
#
# Regenerate a fuller matrix with: maturin generate-ci github

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload wheels to PyPI (requires tag checkout or use only after verifying artifacts)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  MATURIN_ARGS: --release --out dist --locked --compatibility pypi

jobs:
  linux:
    name: linux (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ env.MATURIN_ARGS }}
          manylinux: "2_28"
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl

  macos:
    name: macos (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64
          - runner: macos-15-intel
            target: x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: ${{ env.MATURIN_ARGS }}
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  windows:
    name: windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: x64

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: ${{ env.MATURIN_ARGS }}
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  smoke-test:
    name: smoke test (linux x86_64 wheel)
    needs: [linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wheel and import
        run: |
          python -m pip install -U pip
          python -m pip install dist/*.whl numpy
          python -c "import grumpy as gr; print('grumpy', gr.__version__)"
          python -c "import grumpy as gr; x = gr.array([[1, 2], [3, 4]], dtype=gr.int32); assert x[0, 1] == 2"

  publish:
    name: publish to PyPI
    needs: [linux, macos, windows, sdist, smoke-test]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && inputs.publish)
    environment:
      name: pypi
      url: https://pypi.org/p/grumpy
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  github-release:
    name: attach wheels to GitHub Release
    needs: [linux, macos, windows, sdist, smoke-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
