name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "benchmarks/**"
      - "python/**"
      - "src/**"
      - "LICENSE-FAQ.md"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          python -m pip install maturin numpy plotly awkward
          python -m pip install "mkdocs>=1.5,<2" "mkdocs-material>=9,<10" "mkdocstrings[python]>=0.27"

      - name: Build extension
        run: |
          maturin build --release -o dist
          python -m pip install dist/*.whl

      - name: Build site
        env:
          GRUMPY_BENCH_NROWS: "2048"
          GRUMPY_BENCH_NCOLS: "128"
          GRUMPY_BENCH_NFANCY: "2048"
          GRUMPY_BENCH_WARMUP: "2"
          GRUMPY_BENCH_REPEATS: "5"
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
