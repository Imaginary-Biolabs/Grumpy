name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install maturin and dev deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin "pytest>=7" "pytest-cov>=4" numpy

      - name: Build extension (release)
        run: maturin build --release -o dist

      - name: Install wheel
        run: python -m pip install dist/*.whl

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=grumpy --cov-report=term-missing --cov-report=xml --cov-fail-under=95

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
