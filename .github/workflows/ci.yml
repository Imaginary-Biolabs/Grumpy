name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install maturin and dev deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin "pytest>=7" "pytest-cov>=4" numpy

      - name: Build extension (release)
        run: maturin build --release -o dist

      - name: Install wheel
        run: python -m pip install dist/*.whl

      - name: Run tests with coverage
        run: |
          # Override pyproject addopts so @pytest.mark.coverage tests are included (95% gate).
          python -m pytest tests/ -o addopts= --cov=grumpy --cov-report=term-missing --cov-report=xml --cov-fail-under=95

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Imaginary-Biolabs/Grumpy
          files: coverage.xml
          verbose: true
          fail_ci_if_error: true

  benchmark-smoke:
    name: benchmark smoke (ubuntu, py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install maturin and deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin numpy

      - name: Build extension (release)
        run: maturin build --release -o dist

      - name: Install wheel
        run: python -m pip install dist/*.whl

      - name: Run benchmark smoke
        run: python benchmarks/ci_smoke.py
        working-directory: .
