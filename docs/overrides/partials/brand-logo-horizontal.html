{#-
  Horizontal wordmark for inverse header backgrounds.
  _light = dark ink (light header); _dark = light ink (dark header).
-#}
<img
  class="gr-brand-logo gr-brand-logo--inverse gr-brand-logo--on-light"
  src="{{ 'assets/grumpy_logo_horizontal_light.svg' | url }}"
  alt="{{ config.site_name }}"
/>
<img
  class="gr-brand-logo gr-brand-logo--inverse gr-brand-logo--on-dark"
  src="{{ 'assets/grumpy_logo_horizontal_dark.svg' | url }}"
  alt="{{ config.site_name }}"
/>
