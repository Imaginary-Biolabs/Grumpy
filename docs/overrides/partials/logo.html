{#-
  Header / drawer icon — inverse of page scheme (dark header on light page, etc.).
  _dark assets = light ink for dark backgrounds; grumpy_icon.svg = dark ink for light backgrounds.
-#}
<img
  class="gr-brand-icon gr-brand-icon--inverse gr-brand-icon--on-light"
  src="{{ 'assets/grumpy_icon.svg' | url }}"
  alt=""
/>
<img
  class="gr-brand-icon gr-brand-icon--inverse gr-brand-icon--on-dark"
  src="{{ 'assets/grumpy_icon_dark.svg' | url }}"
  alt=""
/>
